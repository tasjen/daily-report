name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for frontend changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # Mirrors oxlint/oxfmt's scope (everything except graphify-out —
          # including src-tauri's JSON configs) plus everything pnpm build
          # reads.
          filters: |
            frontend:
              - '.github/workflows/ci.yml'
              - '.npmrc'
              - 'index.html'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'public/**'
              - 'src/**'
              - '*.{cjs,css,js,json,jsx,mjs,ts,tsx}'
              - '!(graphify-out)/**/*.{cjs,css,js,json,jsx,mjs,ts,tsx}'
      - if: steps.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm lint
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm fmt:check
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm build

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for Rust changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            rust:
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'rust-toolchain'
              - 'rust-toolchain.toml'
              - 'src-tauri/**'
      - if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        # Pinning by SHA drops the per-branch default the `@stable` ref would
        # have supplied, so the toolchain must be named explicitly.
        with:
          toolchain: stable
      - if: steps.changes.outputs.rust == 'true'
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - if: steps.changes.outputs.rust == 'true'
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked
