name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for frontend changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          # Mirrors Biome's scope (everything except graphify-out — including
          # src-tauri's JSON configs) plus everything pnpm build reads.
          filters: |
            frontend:
              - '.github/workflows/ci.yml'
              - '.npmrc'
              - 'index.html'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'public/**'
              - 'src/**'
              - '*.{cjs,css,js,json,jsx,mjs,ts,tsx}'
              - '!(graphify-out)/**/*.{cjs,css,js,json,jsx,mjs,ts,tsx}'
      - if: steps.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@v6
      - if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm exec biome ci .
      - if: steps.changes.outputs.frontend == 'true'
        run: pnpm build

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for Rust changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'rust-toolchain'
              - 'rust-toolchain.toml'
              - 'src-tauri/**'
      - if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.changes.outputs.rust == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - if: steps.changes.outputs.rust == 'true'
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked
