name: E2E

# Not a required check: a full Linux Tauri debug build is too slow to gate
# PRs, so this runs post-merge and on manual dispatch only. tauri-driver
# supports Linux/Windows only, so it cannot run on macOS dev machines.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            libssl-dev webkit2gtk-driver xvfb
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - name: Build app (debug)
        run: pnpm tauri build --debug --no-bundle
      - name: Run E2E smoke test
        run: xvfb-run pnpm e2e
        env:
          # ubuntu-24.04 webkit2gtk compositing breaks under Xvfb; if the
          # window still doesn't paint, try WEBKIT_DISABLE_DMABUF_RENDERER=1
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
