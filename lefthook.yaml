pre-commit:
  commands:
    lint:
      # priority orders lint fixes before formatting, so oxfmt normalizes
      # whatever --fix rewrites
      priority: 1
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}"
      run: npx oxlint --type-aware --fix {staged_files}
      stage_fixed: true
    fmt:
      priority: 2
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: npx oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: "*.rs"
      # rustfmt directly on the staged files (not `cargo fmt`, which would
      # reformat unstaged files too). It doesn't read the edition from
      # Cargo.toml when invoked standalone, so pass it explicitly.
      run: rustfmt --edition 2021 {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npx tsc -b
    clippy:
      run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
