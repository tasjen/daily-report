pre-commit:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: "*.rs"
      # rustfmt directly on the staged files (not `cargo fmt`, which would
      # reformat unstaged files too). It doesn't read the edition from
      # Cargo.toml when invoked standalone, so pass it explicitly.
      run: rustfmt --edition 2021 {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npx tsc -b
    clippy:
      run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings